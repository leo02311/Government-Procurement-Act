
    <!DOCTYPE html>
    <html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>法規知識圖譜 (Graph RAG Dense Semantic Mode)</title>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            :root {
                --bg-color: #000000;
                --text-color: #ffffff;
                --panel-bg: rgba(20, 20, 20, 0.9);
                --panel-border: #444;
                --law-label: #ffffff;
                --search-bg: #333;
                --search-border: #555;
                --scrollbar-track: #2a2a2a;
                --scrollbar-thumb: #555;
                --hierarchical-link: #bbbbbb;
            }
            
            [data-theme="light"] {
                --bg-color: #f8f9fa;
                --text-color: #212529;
                --panel-bg: rgba(255, 255, 255, 0.9);
                --panel-border: #ccc;
                --law-label: #212529;
                --search-bg: #fff;
                --search-border: #aaa;
                --scrollbar-track: #e0e0e0;
                --scrollbar-thumb: #aaa;
                --hierarchical-link: #777777;
            }

            body { margin: 0; overflow: hidden; background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, sans-serif; transition: background-color 0.3s, color 0.3s; }
            #graph-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
            #ui-panel { position: absolute; top: 20px; left: 20px; width: 340px; background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 10px; padding: 15px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(5px); transition: background 0.3s, border-color 0.3s; }
            #detail-panel { position: absolute; top: 20px; right: 20px; width: 350px; max-height: 90vh; background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 10px; padding: 20px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); overflow-y: auto; display: none; backdrop-filter: blur(5px); transition: background 0.3s, border-color 0.3s; }
            .node-label { font-size: 12px; pointer-events: none; fill: var(--text-color); text-shadow: 0px 0px 3px var(--bg-color); }
            .law-label { font-size: 16px; font-weight: bold; fill: var(--law-label); text-shadow: 0px 0px 5px var(--bg-color); }
            input.search-box { width: 100%; background: var(--search-bg); border: 1px solid var(--search-border); color: var(--text-color); padding: 8px; border-radius: 5px; margin-top: 10px; transition: background 0.3s, border-color 0.3s, color 0.3s; }
            input.search-box:focus { outline: none; border-color: #39ff14; }
            .legend-item { display: flex; align-items: center; margin-top: 5px; font-size: 13px; }
            .legend-color { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
            .legend-line { width: 20px; height: 2px; margin-right: 8px; }
            ::-webkit-scrollbar { width: 8px; }
            ::-webkit-scrollbar-track { background: var(--scrollbar-track); border-radius: 4px; }
            ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
            ::-webkit-scrollbar-thumb:hover { background: #777; }
            #focus-badge {
                display: none;
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(57, 255, 20, 0.15);
                border: 1px solid #39ff14;
                color: #39ff14;
                padding: 6px 18px;
                border-radius: 20px;
                font-size: 13px;
                cursor: pointer;
                z-index: 100;
                backdrop-filter: blur(4px);
                text-shadow: 0 0 6px #39ff14;
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0%, 100% { box-shadow: 0 0 5px #39ff14; }
                50% { box-shadow: 0 0 15px #39ff14; }
            }
            #theme-toggle {
                position: absolute;
                top: 20px;
                right: 20px;
                z-index: 15;
                background: var(--panel-bg);
                border: 1px solid var(--panel-border);
                color: var(--text-color);
                border-radius: 50%;
                width: 40px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                box-shadow: 0 4px 10px rgba(0,0,0,0.3);
                transition: background 0.3s, color 0.3s;
            }
            #detail-panel { top: 70px; }
            /* Fullscreen Loader */
            #fullscreen-loader {
                position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                background-color: var(--bg-color); z-index: 9999;
                display: flex; flex-direction: column; justify-content: center; align-items: center;
                transition: opacity 0.5s;
            }
            #fullscreen-loader .spinner-border { width: 3rem; height: 3rem; margin-bottom: 20px; color: #39ff14; border: 0.25em solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spinner-border .75s linear infinite; }
            @keyframes spinner-border { to { transform: rotate(360deg); } }
        </style>
    </head>
    <body>
        <div id="fullscreen-loader">
            <div class="spinner-border" role="status"></div>
            <h4 style="color: #39ff14; text-shadow: 0 0 10px #39ff14;">載入極限語意圖譜中...</h4>
            <div id="loader-status" class="text-secondary mt-2" style="font-size: 0.9em;">正在下載圖譜資料...</div>
            <div style="width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 12px; overflow: hidden;">
                <div id="loader-bar" style="width: 0%; height: 100%; background: #39ff14; border-radius: 2px; transition: width 0.3s;"></div>
            </div>
        </div>
        <button id="theme-toggle" title="切換深淺色模式">☀️</button>
        <div id="graph-container"></div>
        <iframe id="mindmap-frame" style="display: none;"></iframe>
        
        <div id="ui-panel">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h4 class="mb-0" style="color: #39ff14; text-shadow: 0 0 10px #39ff14;">🌌 極限語意圖譜</h4>
                <button id="ui-panel-toggle" class="btn btn-sm text-white" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">▼</button>
            </div>
            <div id="ui-panel-content">
            <div class="text-secondary mb-3" style="font-size: 0.8em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">
                <span class="opacity-75">最後更新日期: 2026-06-02</span>
            </div>
            <div class="text-secondary mb-3" style="font-size: 0.9em;">
                共載入 968 個實體節點<br>
                <div class="mt-2" id="graph-stats">
                    <span class="text-secondary">✦ 階層歸屬線：892 條</span><br>
                    <span class="text-warning">✦ 法規級交集：209 條</span><br>
                    <span style="color:#39ff14; text-shadow: 0 0 5px #39ff14;">✦ 法條對法條：191 條</span>
                </div>
            </div>
            
            <div class="mb-3">
                <div class="btn-group w-100" role="group">
                    <input type="radio" class="btn-check" name="btnradio" id="btn-network" autocomplete="off" checked>
                    <label class="btn btn-outline-success" for="btn-network" style="color:#39ff14; border-color:#39ff14;">🌌 網狀關聯</label>

                    <input type="radio" class="btn-check" name="btnradio" id="btn-mindmap" autocomplete="off">
                    <label class="btn btn-outline-success" for="btn-mindmap" style="color:#39ff14; border-color:#39ff14;">🌳 樹狀心智圖</label>
                </div>
            </div>
            
            <div id="mindmap-toggles" class="mb-3 p-2 rounded" style="display: none; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
                <div class="text-secondary mb-2" style="font-size: 0.8em;">🌳 心智圖模式切換</div>
                <div class="btn-group w-100" role="group">
                    <input type="radio" class="btn-check" name="mindmap-mode" id="mm-official" autocomplete="off" checked>
                    <label class="btn btn-sm btn-outline-info" for="mm-official">📜 法規章節</label>
                    <input type="radio" class="btn-check" name="mindmap-mode" id="mm-thematic" autocomplete="off">
                    <label class="btn btn-sm btn-outline-warning" for="mm-thematic">💡 實務主題</label>
                </div>
            </div>
            
            <div class="mb-3" id="legend-container">
                <div class="legend-item"><div class="legend-color" style="background:#0d6efd"></div> 母法節點 (Law)</div>
                <div class="legend-item"><div class="legend-color" style="background:#198754"></div> 子法條文 (Article)</div>
                <div class="legend-item"><div class="legend-line" style="background:var(--hierarchical-link)"></div> 階層歸屬 (所屬法規)</div>
                <div class="legend-item"><div class="legend-line" style="background:#f39c12; border:1px dashed #f39c12"></div> 跨法規交集 (Law Level)</div>
                <div class="legend-item"><div class="legend-line" style="background:#39ff14; border:2px solid #39ff14"></div> 跨條文交集 (Article Level)</div>
            </div>

            <div class="mb-3 p-2 rounded" id="edge-toggles" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
                <div class="text-secondary mb-2" style="font-size: 0.8em;">🔍 連線顯示控制</div>
                <div class="form-check form-switch mb-1">
                    <input class="form-check-input" type="checkbox" id="toggle-hierarchical" checked>
                    <label class="form-check-label" style="font-size: 0.85em; color: var(--text-color);" for="toggle-hierarchical">顯示階層歸屬線 (灰)</label>
                </div>
                <div class="form-check form-switch mb-1">
                    <input class="form-check-input" type="checkbox" id="toggle-law-semantic" checked>
                    <label class="form-check-label text-warning" style="font-size: 0.85em;" for="toggle-law-semantic">顯示法規交集 (黃)</label>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="toggle-article-semantic" checked>
                    <label class="form-check-label" style="font-size: 0.85em; color: #39ff14;" for="toggle-article-semantic">顯示條文交集 (綠)</label>
                </div>
            </div>
            
            <a href="index.html" class="btn btn-outline-info w-100 mb-2">🔙 返回題庫</a>
            
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜尋法規或關鍵字 (發光)">
            <div class="d-flex gap-2 mt-3" id="action-buttons-container">
                <button class="btn btn-sm btn-outline-success w-100" id="resetZoom" style="color:#39ff14; border-color:#39ff14;">重置視角</button>
                <a href="legal_mindmap.opml" download id="downloadOpmlBtn" class="btn btn-sm btn-outline-warning w-100" style="display: none;">下載 OPML</a>
            </div>
            </div> <!-- close ui-panel-content -->
        </div>
        
        <div id="detail-panel">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <h5 id="detail-title" class="mb-0" style="color: #39ff14; text-shadow: 0 0 5px #39ff14;">標題</h5>
                <button type="button" class="btn-close btn-close-white" aria-label="Close" onclick="closeDetail()"></button>
            </div>
            <hr class="border-secondary mt-0">
            <div id="detail-content" style="white-space: pre-wrap; font-size: 0.95em; line-height: 1.6; color: #fff;"></div>
            <div id="detail-semantic" class="mt-3 p-2 bg-dark rounded border" style="display:none; font-size: 0.85em; border-color: #39ff14 !important;"></div>
        </div>

        <div id="focus-badge" onclick="unfocus()">🎯 焦點模式 ─ 點我取消</div>

        <script>
            const width = window.innerWidth, height = window.innerHeight;
            const color = d3.scaleOrdinal(d3.schemeCategory10);
            const isMobile = window.innerWidth < 768;
            
            const loaderStatus = document.getElementById('loader-status');
            const loaderBar = document.getElementById('loader-bar');
            
            function updateLoader(pct, msg) {
                loaderBar.style.width = pct + '%';
                if (msg) loaderStatus.textContent = msg;
            }
            
            // Progress-aware fetch
            fetch('graph_data.json').then(response => {
                const total = +response.headers.get('Content-Length') || 0;
                if (!total || !response.body) return response.json();
                
                let loaded = 0;
                const reader = response.body.getReader();
                const chunks = [];
                
                function pump() {
                    return reader.read().then(({done, value}) => {
                        if (done) {
                            const text = new TextDecoder().decode(new Uint8Array(chunks.reduce((a,c) => [...a,...c], [])));
                            return JSON.parse(text);
                        }
                        chunks.push(value);
                        loaded += value.length;
                        updateLoader(Math.min(Math.round(loaded/total*60), 60), `下載中... ${Math.round(loaded/1024)} / ${Math.round(total/1024)} KB`);
                        return pump();
                    });
                }
                return pump();
            }).then(graphData => {
            updateLoader(65, '建立節點索引...');

            // Build adjacency index for O(1) neighbor lookup
            const linkedByIndex = {};
            graphData.links.forEach(l => {
                const s = (typeof l.source === 'object') ? l.source.id : l.source;
                const t = (typeof l.target === 'object') ? l.target.id : l.target;
                linkedByIndex[`${s},${t}`] = true;
                linkedByIndex[`${t},${s}`] = true;
            });
            function isConnected(a, b) {
                return linkedByIndex[`${a.id},${b.id}`] || a.id === b.id;
            }

            let focusedNode = null;
            let currentTransform = d3.zoomIdentity;
            let cullTimeout = null;

            function performCulling() {
                // Culling with margin (approx 0.5 screen size buffer to prevent frequent flickering)
                const marginX = width * 0.5; 
                const marginY = height * 0.5;
                
                const t = currentTransform;
                const x0 = (-t.x - marginX) / t.k;
                const x1 = (-t.x + width + marginX) / t.k;
                const y0 = (-t.y - marginY) / t.k;
                const y1 = (-t.y + height + marginY) / t.k;
                
                const visibleNodes = new Set();
                
                node.style("display", d => {
                    const vis = d.x >= x0 && d.x <= x1 && d.y >= y0 && d.y <= y1;
                    if (vis) visibleNodes.add(d.id);
                    return vis ? null : "none";
                });
                
                labels.style("display", d => {
                    const vis = d.x >= x0 && d.x <= x1 && d.y >= y0 && d.y <= y1;
                    return vis ? null : "none";
                });
                
                // For links, respect toggle state
                const showHierarchical = document.getElementById('toggle-hierarchical')?.checked ?? true;
                const showLawSemantic = document.getElementById('toggle-law-semantic')?.checked ?? true;
                const showArticleSemantic = document.getElementById('toggle-article-semantic')?.checked ?? true;
                
                link.style("display", d => {
                    let toggleVis = false;
                    if (d.isArticleLevel) toggleVis = showArticleSemantic;
                    else if (d.isSemantic) toggleVis = showLawSemantic;
                    else toggleVis = showHierarchical;
                    
                    if (!toggleVis) return "none";
                    
                    const vis = visibleNodes.has((typeof d.source === 'object' ? d.source.id : d.source)) || 
                                visibleNodes.has((typeof d.target === 'object' ? d.target.id : d.target));
                    return vis ? null : "none";
                });
            }

            const zoom = d3.zoom().scaleExtent([0.1, 4]).on("zoom", (e) => {
                g.attr("transform", e.transform);
                currentTransform = e.transform;
                if (cullTimeout) clearTimeout(cullTimeout);
                cullTimeout = setTimeout(performCulling, 80); // Throttle 80ms
            });
            const svg = d3.select("#graph-container").append("svg")
                .attr("width", width).attr("height", height)
                .call(zoom)
                .on("click", (event) => {
                    // Click on background -> unfocus
                    if (event.target.tagName === 'svg' || event.target.tagName === 'g') {
                        unfocus();
                    }
                });
                
            const g = svg.append("g");
            document.getElementById("resetZoom").addEventListener("click", () => {
                svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
                unfocus();
            });

            function focus(event, d) {
                event.stopPropagation();
                if (focusedNode && focusedNode.id === d.id) {
                    unfocus();
                    return;
                }
                focusedNode = d;
                node.attr("opacity", o => isConnected(d, o) ? 1 : 0.05);
                node.attr("stroke", o => o.id === d.id ? "#39ff14" : "#fff");
                node.attr("stroke-width", o => o.id === d.id ? 3 : 1);
                link.attr("opacity", l => {
                    const s = typeof l.source === 'object' ? l.source.id : l.source;
                    const t = typeof l.target === 'object' ? l.target.id : l.target;
                    return s === d.id || t === d.id ? (l.isArticleLevel ? 0.9 : l.isSemantic ? 0.8 : 0.5) : 0.02;
                });
                document.getElementById('focus-badge').style.display = 'block';
            }

            window.unfocus = function unfocus() {
                focusedNode = null;
                node.attr("opacity", 1).attr("stroke", "#fff").attr("stroke-width", 1);
                link.attr("opacity", l => l.isArticleLevel ? 0.9 : l.isSemantic ? 0.8 : 0.4);
                document.getElementById('focus-badge').style.display = 'none';
            }
            
            updateLoader(80, '啟動力導向模擬...');
            const simulation = d3.forceSimulation(graphData.nodes)
                .force("link", d3.forceLink(graphData.links).id(d => d.id).distance(d => {
                    if (d.isArticleLevel) return 100;
                    if (d.isSemantic) return 150;
                    if (d.target.isLaw) return 60;
                    return 30;
                }))
                .force("charge", d3.forceManyBody().strength(d => d.isLaw ? -800 : (isMobile ? -40 : -80)))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide().radius(d => d.radius + 2).iterations(isMobile ? 1 : 2))
                .alphaDecay(isMobile ? 0.08 : 0.0228)
                .velocityDecay(isMobile ? 0.5 : 0.4);
                
            const link = g.append("g")
                .selectAll("line")
                .data(graphData.links)
                .join("line")
                .attr("stroke", d => d.isArticleLevel ? "#39ff14" : (d.isSemantic ? "#f39c12" : "var(--hierarchical-link)"))
                .attr("stroke-opacity", d => d.isArticleLevel ? 0.9 : (d.isSemantic ? 0.8 : 0.6))
                .attr("stroke-width", d => d.isArticleLevel ? 3 : (d.isSemantic ? 2 : 1))
                .attr("stroke-dasharray", d => (d.isSemantic && !d.isArticleLevel) ? "5,5" : "none");
                
            const node = g.append("g")
                .selectAll("circle")
                .data(graphData.nodes)
                .join("circle")
                .attr("r", d => d.radius)
                .attr("fill", d => d.isLaw ? "#0d6efd" : color(d.group))
                .attr("stroke", "var(--bg-color)")
                .attr("stroke-width", 1)
                .call(drag(simulation));
                
            node.on("click", (event, d) => {
                // Focus mode (highlight neighbors)
                focus(event, d);

                // Detail panel (only for article nodes)
                if (d.isLaw) return;
                document.getElementById('detail-title').innerText = d.label;
                document.getElementById('detail-content').innerText = d.content;
                
                const semanticLinks = graphData.links.filter(l => (typeof l.source === 'object' ? l.source.id : l.source) === d.id && l.isSemantic);
                const semanticPanel = document.getElementById('detail-semantic');
                
                if (semanticLinks.length > 0) {
                    let html = '<strong style="color:#39ff14;">✨ LLM 萃取關聯：</strong><ul class="mb-0 ps-3 mt-1">';
                    semanticLinks.forEach(l => {
                        if (l.isArticleLevel) {
                            html += `<li style="color:#39ff14;">與 <b>${l.target_name}</b> 實體連線：<br><span class="text-muted" style="font-size:0.9em;">${l.reason}</span></li>`;
                        } else {
                            const tLabel = typeof l.target === 'object' ? l.target.label : l.target;
                            html += `<li class="text-warning">與 <b>${tLabel}</b> 母法連線：<br><span class="text-muted" style="font-size:0.9em;">${l.reason}</span></li>`;
                        }
                    });
                    html += '</ul>';
                    semanticPanel.innerHTML = html;
                    semanticPanel.style.display = 'block';
                } else {
                    semanticPanel.style.display = 'none';
                }
                
                document.getElementById('detail-panel').style.display = 'block';
            });
            
            node.append("title").text(d => d.label);
                
            const labels = g.append("g")
                .selectAll("text")
                .data(graphData.nodes.filter(d => d.isLaw))
                .join("text")
                .attr("class", "law-label")
                .attr("dx", 18).attr("dy", 5)
                .text(d => d.label);
                
            let tickCount = 0;
            const tickSkip = isMobile ? 3 : 1; // Mobile: update DOM every 3rd tick
            simulation.on("tick", () => {
                tickCount++;
                if (tickCount % tickSkip !== 0) return;
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("cx", d => d.x).attr("cy", d => d.y);
                labels.attr("x", d => d.x).attr("y", d => d.y);
            });
            
            function drag(sim) {
                return d3.drag()
                    .on("start", e => { if (!e.active) sim.alphaTarget(0.3).restart(); e.subject.fx = e.subject.x; e.subject.fy = e.subject.y; })
                    .on("drag", e => { e.subject.fx = e.x; e.subject.fy = e.y; })
                    .on("end", e => { if (!e.active) sim.alphaTarget(0); e.subject.fx = null; e.subject.fy = null; });
            }
            
            window.closeDetail = () => document.getElementById('detail-panel').style.display = 'none';
            
            document.getElementById('searchInput').addEventListener('input', e => {
                const query = e.target.value.toLowerCase().trim();
                if (!query) {
                    unfocus();
                    return;
                }
                focusedNode = null; // clear focus when searching
                node.attr("opacity", d => {
                    const match = d.isLaw ? d.label.toLowerCase().includes(query) : (d.label.toLowerCase().includes(query) || (d.content && d.content.toLowerCase().includes(query)));
                    return match ? 1 : 0.05;
                }).attr("stroke", d => {
                    const match = d.isLaw ? d.label.toLowerCase().includes(query) : (d.label.toLowerCase().includes(query) || (d.content && d.content.toLowerCase().includes(query)));
                    return match ? "#39ff14" : "#fff";
                }).attr("stroke-width", d => {
                    const match = d.isLaw ? d.label.toLowerCase().includes(query) : (d.label.toLowerCase().includes(query) || (d.content && d.content.toLowerCase().includes(query)));
                    return match ? 3 : 1;
                });
                link.attr("opacity", 0.05);
            });

            // Edge Toggles Logic
            const toggleHierarchical = document.getElementById('toggle-hierarchical');
            const toggleLawSemantic = document.getElementById('toggle-law-semantic');
            const toggleArticleSemantic = document.getElementById('toggle-article-semantic');

            // Mobile: hide hierarchical lines by default (they're the densest)
            if (isMobile) {
                toggleHierarchical.checked = false;
            }

            function updateEdgeVisibility() {
                performCulling();
            }

            toggleHierarchical.addEventListener('change', updateEdgeVisibility);
            toggleLawSemantic.addEventListener('change', updateEdgeVisibility);
            toggleArticleSemantic.addEventListener('change', updateEdgeVisibility);

            // Hide Loader
            updateLoader(100, '渲染完成！');
            const loader = document.getElementById('fullscreen-loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                performCulling(); // Initial culling pass
            }, 500);

            }).catch(err => {
                const loader = document.getElementById('fullscreen-loader');
                loader.innerHTML = `<h4 style="color:red;">載入失敗</h4><p style="color:#aaa;">${err.message}</p><p style="color:#888; font-size:0.8em;">請確認 graph_data.json 是否存在或網路是否正常</p>`;
            }); // END FETCH THEN


            // Dual Mode Toggle Logic
            const svgContainer = document.getElementById('graph-container');
            const mindmapFrame = document.getElementById('mindmap-frame');
            const legendContainer = document.getElementById('legend-container');
            const edgeToggles = document.getElementById('edge-toggles');
            const mindmapToggles = document.getElementById('mindmap-toggles');
            const searchInput = document.getElementById('searchInput');
            const resetZoomBtn = document.getElementById('resetZoom');
            const downloadOpmlBtn = document.getElementById('downloadOpmlBtn');
            const graphStats = document.getElementById('graph-stats');
            
            const btnOfficial = document.getElementById('mm-official');
            const btnThematic = document.getElementById('mm-thematic');

            document.getElementById('btn-network').addEventListener('change', (e) => {
                if(e.target.checked) {
                    svgContainer.style.display = 'block';
                    mindmapFrame.style.display = 'none';
                    mindmapFrame.style.width = '0';
                    mindmapFrame.style.height = '0';
                    
                    legendContainer.style.display = 'block';
                    edgeToggles.style.display = 'block';
                    mindmapToggles.style.display = 'none';
                    searchInput.style.display = 'block';
                    resetZoomBtn.style.display = 'block';
                    downloadOpmlBtn.style.display = 'none';
                    graphStats.style.display = 'block';
                }
            });

            document.getElementById('btn-mindmap').addEventListener('change', (e) => {
                if(e.target.checked) {
                    svgContainer.style.display = 'none';
                    mindmapFrame.style.display = 'block';
                    mindmapFrame.style.width = '100vw';
                    mindmapFrame.style.height = '100vh';
                    mindmapFrame.style.border = 'none';
                    mindmapFrame.style.position = 'absolute';
                    mindmapFrame.style.top = '0';
                    mindmapFrame.style.left = '0';
                    mindmapFrame.style.zIndex = '1';
                    
                    // Hide graph-specific UI elements to give mindmap full screen
                    legendContainer.style.display = 'none';
                    edgeToggles.style.display = 'none';
                    mindmapToggles.style.display = 'block';
                    searchInput.style.display = 'none';
                    resetZoomBtn.style.display = 'none';
                    downloadOpmlBtn.style.display = 'block';
                    graphStats.style.display = 'none';
                    
                    // Also close the detail panel and clear focus mode
                    if (typeof closeDetail === 'function') closeDetail();
                    if (typeof window.unfocus === 'function') window.unfocus();
                    
                    // Set src if missing
                    if(!mindmapFrame.getAttribute('src')) {
                        mindmapFrame.src = btnOfficial.checked ? 'mindmap.html' : 'thematic_mindmap.html';
                    }
                }
            });
            
            btnOfficial.addEventListener('change', e => {
                if(e.target.checked) mindmapFrame.src = 'mindmap.html';
            });
            btnThematic.addEventListener('change', e => {
                if(e.target.checked) mindmapFrame.src = 'thematic_mindmap.html';
            });
            
            const themeToggleBtn = document.getElementById('theme-toggle');
            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = document.body.dataset.theme;
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                document.body.dataset.theme = newTheme;
                themeToggleBtn.innerText = newTheme === 'light' ? '🌙' : '☀️';
                
                // Force update D3 node/link strokes relying on CSS variables
                node.attr("stroke", "var(--bg-color)");
                link.attr("stroke", d => d.isArticleLevel ? "#39ff14" : (d.isSemantic ? "#f39c12" : "var(--hierarchical-link)"));
                
                // Notify mindmap iframe to change theme
                if (mindmapFrame && mindmapFrame.contentWindow) {
                    mindmapFrame.contentWindow.postMessage({ theme: newTheme }, '*');
                }
            });
            
            // Toggle UI Panel
            const uiPanelToggle = document.getElementById('ui-panel-toggle');
            const uiPanelContent = document.getElementById('ui-panel-content');
            uiPanelToggle.addEventListener('click', () => {
                if (uiPanelContent.style.display === 'none') {
                    uiPanelContent.style.display = 'block';
                    uiPanelToggle.innerText = '▼';
                } else {
                    uiPanelContent.style.display = 'none';
                    uiPanelToggle.innerText = '▲';
                }
            });
            
            // Auto hide on mobile
            if (isMobile) {
                uiPanelContent.style.display = 'none';
                uiPanelToggle.innerText = '▲';
            }
        </script>
    </body>
    </html>
